<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛽ Oakville 燃油价格报告</title>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #28a745;
            --background-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --danger-color: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        header { text-align: center; margin-bottom: 25px; }
        header h1 { color: var(--primary-color); font-size: 2em; margin: 0; }
        header p { color: #666; margin: 5px 0 0 0; }

        #queryButton {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            color: white;
            background-color: var(--secondary-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        #queryButton:hover { background-color: #218838; }
        #queryButton:disabled { background-color: #aaa; cursor: not-allowed; }

        .price-card {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary-color);
        }

        .price-card h3 {
            margin: 0 0 10px 0;
            color: var(--primary-color);
            font-size: 1.1em;
        }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
        }

        .price-item .label {
            font-size: 0.85em;
            color: #666;
            display: block;
        }

        .price-item .value {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--danger-color);
        }

        .loading { text-align: center; color: var(--primary-color); padding: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>⛽ Oakville 油价报告</h>
            <p>每日燃油价格查询</p>
        </header>

        <button id="queryButton">⛽ 查询油价</button>

        <div id="resultsContainer">
            <p style="text-align: center; color: #999;">点击按钮查询最新油价</p>
        </div>
    </div>

    <script>
        document.getElementById('queryButton').addEventListener('click', function() {
            const queryButton = this;
            const resultsContainer = document.getElementById('resultsContainer');
            
            queryButton.disabled = true;
            queryButton.textContent = '查询中...';
            resultsContainer.innerHTML = '<p class="loading">正在获取数据...</p>';

            fetch('/api/gas')
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => {
                    displayResults(data);
                    queryButton.disabled = false;
                    queryButton.textContent = '⛽ 查询油价';
                })
                .catch(error => {
                    console.error('Error:', error);
                    resultsContainer.innerHTML = '<p style="color: red; text-align: center;">获取数据失败</p>';
                    queryButton.disabled = false;
                    queryButton.textContent = '⛽ 查询油价';
                });
        });

        function displayResults(data) {
            const resultsContainer = document.getElementById('resultsContainer');
            let htmlContent = `<p style="text-align: center; color: #666; margin-bottom: 20px;">🕒 更新时间: ${data.timestamp}</p>`;

            if (data.prices && data.prices.length > 0) {
                data.prices.forEach(price => {
                    htmlContent += `
                        <div class="price-card">
                            <h3>📅 ${price.date}</h3>
                            <div class="price-grid">
                                <div class="price-item">
                                    <span class="label">汽油 (Regular)</span>
                                    <span class="value">$${price.regular}</span>
                                </div>
                                <div class="price-item">
                                    <span class="label">高级油 (Premium)</span>
                                    <span class="value">$${price.premium}</span>
                                </div>
                                <div class="price-item">
                                    <span class="label">柴油 (Diesel)</span>
                                    <span class="value">$${price.diesel}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                htmlContent += '<p>暂无数据</p>';
            }

            resultsContainer.innerHTML = htmlContent;
        }
    </script>
</body>
</html>
