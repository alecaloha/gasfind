<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTA 油价</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --fuel-red: #ff3b30;
      --fuel-orange: #ff9500;
      --fuel-yellow: #ffd60a;
      --bg-dark: #0a0a0f;
      --bg-card: #13131a;
      --bg-card2: #1c1c26;
      --text-primary: #f5f5f7;
      --text-muted: #8e8e9a;
      --border: rgba(255, 255, 255, 0.07);
      --glow: rgba(255, 59, 48, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255, 100, 30, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255, 59, 48, 0.08), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      padding-bottom: 48px;
    }

    /* HEADER */
    .header {
      padding: 52px 24px 24px;
      position: relative;
    }

    .header-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fuel-orange);
      margin-bottom: 8px;
    }

    .header-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 15vw, 72px);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text-primary);
    }

    .header h1 span {
      background: linear-gradient(135deg, var(--fuel-orange) 0%, var(--fuel-red) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Stockr 预测区域（标题右侧） */
    .stockr-box {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 16px;
      min-width: 140px;
      text-align: center;
    }

    .stockr-title {
      font-size: 11px;
      color: var(--fuel-orange);
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    .stockr-price {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .stockr-date {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* 切换按钮组 */
    .tab-buttons {
      display: flex;
      gap: 8px;
      padding: 0 20px;
      margin-top: 12px;
    }

    .tab-btn {
      flex: 1;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.03em;
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #ff6b35 0%, var(--fuel-red) 100%);
      border-color: transparent;
      color: white;
      box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4);
    }

    /* 价格卡片（完全保持原有设计） */
    .results {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    .price-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      animation: slideUp 0.4s ease both;
    }

    .price-card:nth-child(1) { animation-delay: 0.05s; }
    .price-card:nth-child(2) { animation-delay: 0.1s; }
    .price-card:nth-child(3) { animation-delay: 0.15s; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .card-date {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .card-change {
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 9999px;
      font-weight: 500;
    }

    .price-main {
      padding: 24px 20px;
      text-align: center;
    }

    .price-number {
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
    }

    .price-unit {
      font-size: 18px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .card-type {
      text-align: center;
      padding-bottom: 16px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Header -->
    <div class="header">
      <div class="header-title">
        <div>
          <div class="header-eyebrow">REAL-TIME GTA</div>
          <h1>GTA <span>FUEL</span></h1>
        </div>
        
        <!-- Stockr 预测区域（严格放在标题右侧空白处） -->
        <div class="stockr-box" id="stockr-box">
          <div class="stockr-title">STOCKR 预测</div>
          <div id="stockr-content">加载中...</div>
        </div>
      </div>
    </div>

    <!-- 切换按钮 -->
    <div class="tab-buttons">
      <button class="tab-btn active" data-mode="dan" onclick="switchMode('dan')">最新预测</button>
      <button class="tab-btn" data-mode="gaswizard" onclick="switchMode('gaswizard')">Gas Wizard</button>
      <button class="tab-btn" data-mode="citynews" onclick="switchMode('citynews')">CityNews</button>
    </div>

    <!-- 主要内容区域（价格卡片） -->
    <div class="results" id="results">
      <!-- 动态插入卡片 -->
    </div>

  </div>

  <script>
    let currentMode = 'dan';

    async function loadStockr() {
      try {
        const res = await fetch('/api/stockr');
        const data = await res.json();
        if (!data.success) return;

        let html = '';
        data.predictions.forEach(p => {
          html += `
            <div style="margin-bottom:8px;">
              <div style="font-size:13px;color:#ff9500;">${p.label}</div>
              <div style="font-size:24px;font-weight:700;">${p.price}</div>
              <div style="font-size:12px;color:#8e8e9a;">${p.date}</div>
            </div>`;
        });
        document.getElementById('stockr-content').innerHTML = html;
      } catch(e) {}
    }

    async function loadPrices(mode) {
      currentMode = mode;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });

      const container = document.getElementById('results');
      container.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#8e8e9a;">加载中...</div>';

      try {
        let apiUrl = '';
        if (mode === 'dan') apiUrl = '/api/gas';
        else if (mode === 'gaswizard') apiUrl = '/api/gaswizard';
        else if (mode === 'citynews') apiUrl = '/api/citynews';

        const res = await fetch(apiUrl);
        const data = await res.json();

        if (!data.success) throw new Error();

        if (mode === 'citynews') {
          // CityNews 特殊展示（保持卡片风格）
          container.innerHTML = `
            <div class="price-card">
              <div class="price-main">
                <div style="font-size:18px;margin-bottom:8px;">油价预期（${data.date}）</div>
                <div style="font-size:42px;font-weight:700;color:${data.rise ? '#ff3b30' : '#30d158'}">
                  ${data.rise ? '↑' : '↓'} ${data.cents} 分
                </div>
                <div style="margin-top:16px;font-size:15px;">平均 ${data.average} 分/L</div>
              </div>
            </div>
            <div style="margin-top:20px;text-align:center;font-size:13px;color:#8e8e9a;">${data.description}</div>`;
        } else {
          // Dan / GasWizard 使用原有卡片样式
          let html = '';
          data.predictions.forEach(p => {
            html += `
              <div class="price-card">
                <div class="card-header">
                  <div class="card-date">${p.date}</div>
                  ${p.change ? `<div class="card-change" style="background:rgba(255,59,48,0.15);color:#ff3b30;">${p.change}</div>` : ''}
                </div>
                <div class="price-main">
                  <div class="price-number">${p.regular}</div>
                  <div class="price-unit">¢/L</div>
                </div>
                <div class="card-type">Regular</div>
              </div>`;
          });
          container.innerHTML = html;
        }
      } catch (e) {
        container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#ff3b30;">加载失败，请稍后重试</div>`;
      }
    }

    function switchMode(mode) {
      loadPrices(mode);
    }

    // 初始化
    window.onload = () => {
      loadStockr();
      loadPrices('dan');   // 默认显示最新预测
    };
  </script>
</body>
</html>
