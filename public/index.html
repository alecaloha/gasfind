<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛽ Oakville 燃油价格报告器</title>
    <style>
        /* --- 🎨 CSS (保持简洁现代风格) --- */
        :root {
            --primary-color: #007bff;
            --secondary-color: #28a745;
            --background-color: #e9ecef;
            --card-bg: #ffffff;
            --text-color: #343a40;
            --danger-color: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--primary-color); font-size: 2.2em; margin-bottom: 5px; }
        header p { color: #6c757d; margin-top: 0; }

        #queryButton {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.3em;
            color: white;
            background-color: var(--secondary-color);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
            margin-bottom: 30px;
        }

        #queryButton:hover { background-color: #218838; }
        #queryButton:disabled { background-color: #aaa; cursor: not-allowed; }

        #resultsContainer h2 {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .price-section {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            background-color: #f8f9fa;
        }

        .price-section h3 {
            color: #343a40;
            font-size: 1.4em;
            margin-top: 0;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
        }

        .price-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
        }

        .fuel-card {
            flex: 1 1 220px;
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border-top: 5px solid var(--primary-color);
        }

        .fuel-card h4 { margin: 0 0 15px 0; font-size: 1.2em; color: #555; }
        .price-label { font-size: 0.9em; color: #6c757d; margin-bottom: 5px; display: block; }
        .price-display { font-size: 2.2em; font-weight: 900; color: var(--danger-color); margin-bottom: 10px; }
        
        .warning-box {
            padding: 15px;
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            border-radius: 8px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>⛽ Oakville 燃油价格报告</h1>
            <p>Powered by Vercel Serverless Functions</p>
        </header>

        <button id="queryButton">⛽ 立即查询油价报告</button>

        <div id="resultsContainer">
            <!-- 结果将动态加载到这里 -->
        </div>

        <div class="warning-box">
            <strong>⚠️ 重要提醒：</strong> 请勿将此页面用于商业用途。本报告中显示的数据为示例数据，实际抓取功能依赖于后端 API 配置。
        </div>
    </div>

    <script>
        document.getElementById('queryButton').addEventListener('click', function() {
            const queryButton = this;
            const resultsContainer = document.getElementById('resultsContainer');
            
            queryButton.disabled = true;
            queryButton.textContent = '⏳ 正在查询后端 API，请稍候...';
            resultsContainer.innerHTML = '<p style="text-align: center; color: var(--primary-color);">🔍 正在从服务器获取数据...</p>';

            // 调用 Vercel Serverless Function
            fetch('/api/gas-prices')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    displayResults(data);
                    queryButton.disabled = false;
                    queryButton.textContent = '⛽ 重新查询油价报告';
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    resultsContainer.innerHTML = '<p style="color: red; text-align: center;">❌ 获取数据失败，请稍后重试或检查控制台。</p>';
                    queryButton.disabled = false;
                    queryButton.textContent = '⛽ 重新查询油价报告';
                });
        });

        function displayResults(data) {
            const resultsContainer = document.getElementById('resultsContainer');
            let htmlContent = '';

            htmlContent += `
                <div class="price-section" style="background-color: #d1e7ff; border: 1px solid #b8daff;">
                    <h3>${data.source || 'API 数据查询'}</h3>
                    <p><strong>查询时间：</strong> ${data.timestamp}</p>
                </div>
            `;

            if (data.prices && data.prices.length > 0) {
                htmlContent += '<div class="price-section">';
                htmlContent += '<h3>📈 燃油价格概览</h3>';
                htmlContent += '<div class="price-grid">';
                
                data.prices.forEach(price => {
                    htmlContent += `
                        <div class="fuel-card">
                            <h4>📅 ${price.date}</h4>
                            <p><span class="price-label">汽油 (Regular)</span></p>
                            <div class="price-display">$${price.regular}</div>
                            <p><span class="price-label">高级油 (Premium)</span></p>
                            <div class="price-display">$${price.premium}</div>
                            <p><span class="price-label">柴油 (Diesel)</span></p>
                            <div class="price-display">$${price.diesel}</div>
                        </div>
                    `;
                });
                htmlContent += '</div></div>';
            } else {
                htmlContent += '<p>暂无数据</p>';
            }

            resultsContainer.innerHTML = htmlContent;
        }
    </script>
</body>
</html>
