<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTA 油价预测</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen py-8">
  <div class="max-w-md mx-auto px-4">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">GTA 油价预测</h1>
      <p class="text-gray-500 text-sm mt-1">Dan McTeague • 未来 3 天</p>
    </div>

    <div id="predictions" class="space-y-4">
      <!-- JS 动态填充 -->
    </div>

    <div class="text-center text-xs text-gray-400 mt-10">
      数据来源：Canadians for Affordable Energy<br>
      预测仅供参考 • 实际价格以加油站为准
    </div>
  </div>

  <script>
    async function loadGasPrices() {
      try {
        const res = await fetch('/api/gas');
        const data = await res.json();

        if (!data.success) throw new Error(data.error);

        const container = document.getElementById('predictions');
        container.innerHTML = '';

        data.predictions.forEach(p => {
          const div = document.createElement('div');
          div.className = `bg-white rounded-2xl shadow-sm p-5 border border-gray-100`;
          div.innerHTML = `
            <div class="flex justify-between items-start">
              <div>
                <div class="text-lg font-semibold text-gray-900">${p.date}</div>
              </div>
              ${p.change ? `<span class="text-sm px-3 py-1 rounded-full ${p.change.includes('↑') ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">${p.change}</span>` : ''}
            </div>
            <div class="mt-3 flex items-baseline">
              <span class="text-5xl font-bold text-gray-900">${p.regular}</span>
              <span class="text-xl text-gray-400 ml-1">¢/L</span>
              <span class="ml-auto text-sm text-gray-500">Regular</span>
            </div>
          `;
          container.appendChild(div);
        });

      } catch (err) {
        document.getElementById('predictions').innerHTML = `
          <div class="bg-red-50 text-red-600 p-6 rounded-2xl text-center">
            加载油价失败，请稍后刷新<br>
            <span class="text-xs">${err.message}</span>
          </div>`;
      }
    }

    // 页面加载时执行
    loadGasPrices();
    
    // 可选：每 30 分钟自动刷新
    setInterval(loadGasPrices, 30 * 60 * 1000);
  </script>
</body>
</html>
